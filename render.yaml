services:
  - type: web
    name: trendscope-api
    runtime: python
    region: frankfurt
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: RAPIDAPI_KEY
        sync: false
      - key: CLAUDE_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: UPDATE_INTERVAL_MINUTES
        value: 60
