<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeerani — لوحة التحكم</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Poppins:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root { --p:#6c5ce7; --a:#00cec9; --d:#0a0a0f; --d2:#12121a; --d3:#1a1a2e; --d4:#252540; --t:#e8e8f0; --m:#7f7f9a; --b:rgba(255,255,255,0.07); --r:#e17055; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Cairo',sans-serif; background:var(--d); color:var(--t); min-height:100vh; }
        .login { display:flex; align-items:center; justify-content:center; height:100vh; padding:16px; }
        .login-frame { background:var(--d2); border:1px solid var(--b); border-radius:24px; padding:40px 36px 32px; display:flex; flex-direction:column; align-items:center; gap:14px; box-shadow:0 16px 60px rgba(0,0,0,0.5); width:min(90vw, 380px); }
        .login input { padding:14px 20px; border-radius:14px; border:2px solid var(--b); background:var(--d3); color:var(--t); font-family:'Cairo'; font-size:16px; width:100%; text-align:center; outline:none; }
        .login input:focus { border-color:var(--p); }
        .login button { padding:12px 36px; border-radius:14px; border:none; background:var(--p); color:#fff; font-family:'Cairo'; font-size:15px; font-weight:700; cursor:pointer; width:100%; }
        .app { display:none; }
        .top { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; background:var(--d2); border-bottom:1px solid var(--b); position:sticky; top:0; z-index:10; }
        .top-title { font-family:'Poppins'; font-weight:800; font-size:16px; }
        .btn { padding:6px 14px; border-radius:8px; border:1px solid var(--b); background:var(--d3); color:var(--t); font-family:'Cairo'; cursor:pointer; font-size:11px; }
        .btn:hover { background:var(--d4); }
        .content { max-width:700px; margin:0 auto; padding:12px; }
        .stats { display:flex; gap:8px; margin-bottom:12px; }
        .stat { flex:1; background:var(--d2); border:1px solid var(--b); border-radius:14px; padding:12px; text-align:center; }
        .stat b { font-size:24px; color:var(--p); display:block; }
        .stat span { font-size:10px; color:var(--m); }
        .search { width:100%; padding:10px 16px; border-radius:10px; border:1px solid var(--b); background:var(--d2); color:var(--t); font-family:'Cairo'; font-size:14px; outline:none; margin-bottom:12px; }
        .search:focus { border-color:var(--p); }
        .tabs { display:flex; gap:4px; margin-bottom:12px; background:var(--d2); border-radius:10px; padding:3px; }
        .tab { flex:1; text-align:center; padding:7px; border-radius:8px; font-size:12px; font-weight:600; color:var(--m); cursor:pointer; }
        .tab.active { background:var(--p); color:#fff; }
        .card { background:var(--d2); border:1px solid var(--b); border-radius:12px; margin-bottom:6px; overflow:hidden; }
        .item { display:flex; align-items:center; justify-content:space-between; padding:10px 14px; border-bottom:1px solid rgba(255,255,255,0.03); }
        .item:last-child { border:none; }
        .name { font-weight:700; font-size:13px; }
        .id { font-size:9px; color:var(--m); }
        .time { font-size:10px; color:var(--m); }
        .dot-on { width:7px; height:7px; background:var(--a); border-radius:50%; display:inline-block; margin-right:5px; }
        .dot-off { width:7px; height:7px; background:#555; border-radius:50%; display:inline-block; margin-right:5px; }
        .conv { cursor:pointer; transition:0.2s; }
        .conv:hover { background:rgba(108,92,231,0.05); }
        .badge { background:var(--p); color:#fff; font-size:10px; font-weight:700; padding:2px 7px; border-radius:50px; }
        .preview { font-size:11px; color:var(--m); margin-top:2px; max-width:300px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .system-msg { color:var(--a); font-style:italic; }
        .chat-top { display:flex; align-items:center; justify-content:space-between; padding:10px 14px; background:var(--d2); border-bottom:1px solid var(--b); }
        .chat-area { padding:12px; max-height:70vh; overflow-y:auto; display:flex; flex-direction:column; gap:5px; }
        .msg { max-width:80%; padding:7px 11px 3px; border-radius:12px; font-size:12px; line-height:1.5; }
        .msg-r { align-self:flex-start; background:var(--p); color:#fff; border-bottom-right-radius:3px; }
        .msg-l { align-self:flex-end; background:var(--d4); border-bottom-left-radius:3px; }
        .msg-s { align-self:center; color:var(--a); font-size:11px; font-style:italic; }
        .msg small { font-size:9px; opacity:0.5; display:block; text-align:left; }
        .msg .sender { font-size:9px; font-weight:700; opacity:0.6; margin-bottom:1px; }
        .highlight { background:rgba(108,92,231,0.3); border-radius:3px; padding:0 2px; }
        .nav-arrows { display:flex; gap:6px; align-items:center; }
        .nav-arrows button { background:var(--d3); border:1px solid var(--b); color:var(--t); border-radius:6px; padding:2px 8px; cursor:pointer; font-size:12px; }
        .nav-arrows span { font-size:10px; color:var(--m); }
        .empty { text-align:center; color:var(--m); padding:30px 14px; font-size:13px; }
        .panel { display:none; }
        .panel.active { display:block; }
        @media(max-width:768px) { .stat b { font-size:20px; } .stats { gap:4px; } }
    </style>
</head>
<body>

<div class="login" id="login">
    <div class="login-frame">
        <img src="assets/logo.png" alt="Jeerani" style="width:200px;height:auto">
        <div style="color:var(--m);font-size:13px">لوحة التحكم</div>
        <input type="password" id="pass" placeholder="كلمة المرور">
        <button onclick="auth()">دخول</button>
    </div>
</div>

<div class="app" id="app">
    <div class="top">
        <div class="top-title">Jeerani Admin</div>
        <div style="display:flex;gap:6px">
            <button class="btn" onclick="loadLogs()">🔄</button>
            <button class="btn" id="liveBtn" onclick="toggleLive()">📡 مباشر</button>
            <button class="btn" style="color:var(--r)" onclick="logout()">خروج</button>
        </div>
    </div>
    <div class="content">
        <div class="stats">
            <div class="stat"><b id="sAll">0</b><span>مستخدم</span></div>
            <div class="stat"><b id="sOn">0</b><span>متصل</span></div>
            <div class="stat"><b id="sCo">0</b><span>محادثة</span></div>
            <div class="stat"><b id="sBn">0</b><span>محظور</span></div>
        </div>
        <input class="search" id="searchBox" placeholder="🔍 بحث..." oninput="doSearch()">
        <div class="tabs">
            <div class="tab active" data-tab="users">👥 المستخدمين</div>
            <div class="tab" data-tab="convs">💬 المحادثات</div>
            <div class="tab" data-tab="banned">🚫 المحظورين</div>
        </div>
        <div id="p-users" class="panel active"></div>
        <div id="p-convs" class="panel"></div>
        <div id="p-chat" class="panel"></div>
        <div id="p-banned" class="panel"></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-database-compat.js"></script>
<script>
// تشفير كلمة المرور بدل حفظها كنص واضح
function hashPass(s) { let h=0; for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h=h&h;} return 'ah-'+Math.abs(h).toString(36); }
const PASS_HASH = hashPass('Mm123');
let logs = [], convs = {}, totalConvs = 0, live = false, liveRef = null, searchQuery = '', chatHighlights = [], allUsers = {}, onlineIds = new Set(), listenersReady = false, logsLoaded = false, searchTimer = null;

firebase.initializeApp({
    apiKey: "AIzaSyBxr265lCyx0GJw02oE9GQev8kBQRgiTZw",
    databaseURL: "https://jiranak-e9ee2-default-rtdb.firebaseio.com",
    projectId: "jiranak-e9ee2"
});
const db = firebase.database();

let authAttempts = 0;
function auth() {
    const inp = document.getElementById('pass');
    const val = inp.value;
    if (hashPass(val) === PASS_HASH) {
        authAttempts = 0;
        try { localStorage.setItem('jeerani_admin', PASS_HASH); } catch(e) {}
        showApp();
    } else {
        authAttempts++;
        inp.style.borderColor = 'var(--r)';
        inp.placeholder = 'كلمة المرور خاطئة';
        inp.value = '';
        setTimeout(() => { inp.style.borderColor = ''; inp.placeholder = 'كلمة المرور'; }, 2000);
        if (authAttempts >= 5) {
            document.querySelector('.login button').disabled = true;
            setTimeout(() => { document.querySelector('.login button').disabled = false; authAttempts = 0; }, 30000);
        }
    }
}
function showApp() {
    document.getElementById('login').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    initListeners();
}
function logout() {
    try { localStorage.removeItem('jeerani_admin'); } catch(e) {}
    location.reload();
}
// دخول تلقائي — يتحقق أن القيمة المحفوظة تطابق الهاش الصحيح
try { if (localStorage.getItem('jeerani_admin') === PASS_HASH) showApp(); } catch(e) {}
document.getElementById('pass').onkeypress = e => { if (e.key === 'Enter') auth(); };

document.querySelectorAll('.tab').forEach(t => {
    t.onclick = () => {
        document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
        t.classList.add('active');
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.getElementById('p-' + t.dataset.tab).classList.add('active');
    };
});

function toggleLive() {
    live = !live;
    document.getElementById('liveBtn').textContent = live ? '⏹ إيقاف' : '📡 مباشر';
    if (live) {
        liveRef = db.ref('logs').orderByChild('t').startAt(Date.now());
        liveRef.on('child_added', snap => {
            const m = snap.val();
            if (!m || !m.from || !m.to) return;
            // إضافة الرسالة مباشرة بدون إعادة تحميل كل السجل
            logs.unshift(m);
            [['from','fromName'],['to','toName']].forEach(([idKey, nameKey]) => {
                const uid = m[idKey], name = m[nameKey];
                if (!uid || uid === 'admin') return;
                if (!allUsers[uid]) allUsers[uid] = { name: name, firstSeen: m.t, lastSeen: m.t };
                else { if (name) allUsers[uid].name = name; if (m.t > allUsers[uid].lastSeen) allUsers[uid].lastSeen = m.t; }
            });
            const pair = [m.from, m.to].sort().join('_');
            if (!convs[pair]) convs[pair] = { users:{}, msgs:[], lastTime:0, lastText:'' };
            convs[pair].users[m.from] = m.fromName;
            convs[pair].users[m.to] = m.toName;
            convs[pair].msgs.push(m);
            if ((m.t||0) > convs[pair].lastTime) { convs[pair].lastTime = m.t; convs[pair].lastText = m.text; }
            totalConvs = Object.keys(convs).length;
            document.getElementById('sAll').textContent = Object.keys(allUsers).length;
            renderUsers();
            renderConvs();
        });
    } else {
        if (liveRef) { liveRef.off(); liveRef = null; }
    }
}

function fmt(t) {
    if (!t) return '';
    return new Date(t).toLocaleTimeString('ar', {hour:'2-digit', minute:'2-digit', hour12:true});
}
function fmtFull(t) {
    if (!t) return '';
    return new Date(t).toLocaleDateString('ar', {day:'numeric', month:'short'}) + ' ' + fmt(t);
}
function esc(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
function escAttr(t) { return esc(t).replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

function getFpFromId(uid) {
    // ID format: fp-XXXXX-YYYYYYYY → fingerprint = fp-XXXXX
    const parts = uid.split('-');
    if (parts.length >= 2 && parts[0] === 'fp') return parts[0] + '-' + parts[1];
    return null;
}

function banUser(uid, name) {
    if (!confirm('حظر ' + name + '؟')) return;
    db.ref('online/' + uid).remove();
    db.ref('msgs/' + uid).push({ from:'admin', name:'🚫', text:'🚫 تم حظرك من قبل الإدارة', t:firebase.database.ServerValue.TIMESTAMP, system:true });
    db.ref('banned/' + uid).set({ name:name, t:firebase.database.ServerValue.TIMESTAMP });
    // حظر البصمة أيضاً لمنع التحايل بحذف بيانات المتصفح
    const fp = getFpFromId(uid);
    if (fp) db.ref('banned/' + fp).set({ name:name, t:firebase.database.ServerValue.TIMESTAMP, linkedTo:uid });
}
function unbanUser(uid) {
    db.ref('banned/' + uid).remove();
    // إلغاء حظر البصمة المرتبطة
    const fp = getFpFromId(uid);
    if (fp) db.ref('banned/' + fp).remove();
}

function doSearch() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
        searchQuery = document.getElementById('searchBox').value.trim().toLowerCase();
        renderUsers();
        renderConvs();
    }, 250);
}

function highlightText(text, query) {
    if (!query) return esc(text);
    const escaped = esc(text);
    const regex = new RegExp('(' + query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
    return escaped.replace(regex, '<span class="highlight">$1</span>');
}

// تشغيل listeners مرة واحدة فقط
function initListeners() {
    if (listenersReady) return;
    listenersReady = true;

    // المتصلين — realtime
    db.ref('online').on('value', snap => {
        const data = snap.val() || {};
        onlineIds = new Set(Object.keys(data));
        Object.entries(data).forEach(([id, u]) => {
            if (!allUsers[id]) allUsers[id] = { name: u.name, firstSeen: u.t, lastSeen: u.t };
            else { allUsers[id].name = u.name; allUsers[id].lastSeen = u.t; }
        });
        document.getElementById('sOn').textContent = onlineIds.size;
        document.getElementById('sAll').textContent = Object.keys(allUsers).length;
        renderUsers();
    });

    // المحظورين — realtime (إخفاء مدخلات البصمة — تظهر فقط المدخلات بالـ ID الكامل)
    db.ref('banned').on('value', snap => {
        const data = snap.val() || {};
        const list = Object.entries(data).filter(([uid, u]) => !u.linkedTo);
        document.getElementById('sBn').textContent = list.length;
        let h = '<div class="card">';
        if (!list.length) { h += '<div class="empty">لا يوجد محظورين</div>'; }
        else {
            list.forEach(([uid, u]) => {
                h += '<div class="item"><div><span class="name">' + esc(u.name||uid.slice(0,14)) + '</span>';
                h += '<div class="id">' + uid.slice(0,14) + '</div></div>';
                h += '<button class="btn" style="font-size:10px;padding:3px 10px;color:var(--a);border-color:var(--a)" data-uid="' + escAttr(uid) + '" onclick="unbanUser(this.dataset.uid)">إلغاء ❎</button></div>';
            });
        }
        h += '</div>';
        document.getElementById('p-banned').innerHTML = h;
    });

    // تحميل السجل
    loadLogs();
}

function loadLogs() {
    db.ref('logs').orderByChild('t').limitToLast(5000).once('value', snap => {
        const data = snap.val() || {};
        logs = Object.values(data).sort((a, b) => (b.t||0) - (a.t||0));

        convs = {};
        logs.forEach(m => {
            if (!m.from || !m.to) return;
            [['from','fromName'],['to','toName']].forEach(([idKey, nameKey]) => {
                const uid = m[idKey], name = m[nameKey];
                if (!uid || uid === 'admin') return;
                if (!allUsers[uid]) allUsers[uid] = { name: name, firstSeen: m.t, lastSeen: m.t };
                else {
                    if (name) allUsers[uid].name = name;
                    if (m.t < allUsers[uid].firstSeen) allUsers[uid].firstSeen = m.t;
                    if (m.t > allUsers[uid].lastSeen) allUsers[uid].lastSeen = m.t;
                }
            });

            const pair = [m.from, m.to].sort().join('_');
            if (!convs[pair]) convs[pair] = { users:{}, msgs:[], lastTime:0, lastText:'' };
            convs[pair].users[m.from] = m.fromName;
            convs[pair].users[m.to] = m.toName;
            convs[pair].msgs.push(m);
            if ((m.t||0) > convs[pair].lastTime) { convs[pair].lastTime = m.t; convs[pair].lastText = m.text; }
        });
        logsLoaded = true;
        totalConvs = Object.keys(convs).length;
        document.getElementById('sAll').textContent = Object.keys(allUsers).length;
        renderUsers();
        renderConvs();
    });
}

function renderUsers() {
    let entries = Object.entries(allUsers);
    entries.sort((a, b) => {
        const aOn = onlineIds.has(a[0]) ? 1 : 0;
        const bOn = onlineIds.has(b[0]) ? 1 : 0;
        if (aOn !== bOn) return bOn - aOn;
        return (b[1].lastSeen||0) - (a[1].lastSeen||0);
    });
    if (searchQuery) {
        entries = entries.filter(([id, u]) => (u.name||'').toLowerCase().includes(searchQuery) || id.toLowerCase().includes(searchQuery));
    }
    let h = '<div class="card">';
    if (!logsLoaded && !entries.length) { h += '<div class="empty">جاري التحميل...</div>'; }
    else if (!entries.length) { h += '<div class="empty">لا يوجد مستخدمين</div>'; }
    else {
        entries.forEach(([id, u]) => {
            const isOn = onlineIds.has(id);
            const dotCls = isOn ? 'dot-on' : 'dot-off';
            const statusText = isOn ? 'متصل الآن' : fmtFull(u.lastSeen);
            h += '<div class="item"><div><span class="name">' + esc(u.name||'—') + '</span>';
            h += '<span class="' + dotCls + '"></span>';
            h += '<div class="id">' + id.slice(0,14) + ' · ' + statusText + '</div>';
            h += '</div>';
            h += '<button class="btn" style="font-size:10px;padding:2px 6px;color:var(--r);border-color:var(--r)" data-uid="' + escAttr(id) + '" data-name="' + escAttr(u.name||'') + '" onclick="banUser(this.dataset.uid,this.dataset.name)">🚫</button></div>';
        });
    }
    h += '</div>';
    document.getElementById('p-users').innerHTML = h;
}

function renderConvs() {
    const arr = Object.entries(convs).sort((a, b) => b[1].lastTime - a[1].lastTime);
    let filtered = arr;
    if (searchQuery) {
        filtered = arr.filter(([k, c]) => {
            const names = Object.values(c.users).filter(Boolean).join(' ').toLowerCase();
            const hasName = names.includes(searchQuery);
            const hasText = c.msgs.some(m => (m.text||'').toLowerCase().includes(searchQuery));
            return hasName || hasText;
        });
    }
    document.getElementById('sCo').textContent = totalConvs;

    let ch = '';
    if (!filtered.length) { ch = '<div class="card"><div class="empty">' + (searchQuery ? 'لا توجد نتائج لـ "' + esc(searchQuery) + '"' : 'لا توجد محادثات') + '</div></div>'; }
    else {
        filtered.forEach(([key, c]) => {
            const names = Object.values(c.users).filter(Boolean);
            const textCls = c.lastText && c.lastText.startsWith('📌') ? ' system-msg' : '';
            ch += '<div class="card"><div class="item conv" data-conv="' + escAttr(key) + '">';
            ch += '<div><div class="name">' + esc(names.join(' ↔ ')) + '</div>';
            ch += '<div class="preview' + textCls + '">' + esc(c.lastText||'') + '</div>';
            ch += '<div class="time">' + fmtFull(c.lastTime) + '</div></div>';
            ch += '<div class="badge">' + c.msgs.length + '</div></div></div>';
        });
    }
    document.getElementById('p-convs').innerHTML = ch;
}

function openConv(key) {
    const c = convs[key];
    if (!c) return;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('p-chat').classList.add('active');

    const names = Object.values(c.users).filter(Boolean);
    const msgs = [...c.msgs].sort((a, b) => (a.t||0) - (b.t||0));
    const first = msgs[0] ? msgs[0].from : '';

    // حساب highlights لو فيه بحث
    chatHighlights = [];
    if (searchQuery) {
        msgs.forEach((m, i) => {
            if ((m.text||'').toLowerCase().includes(searchQuery)) chatHighlights.push(i);
        });
    }

    let h = '<div class="card">';
    h += '<div class="chat-top"><div><strong>' + esc(names.join(' ↔ ')) + '</strong> <span style="font-size:11px;color:var(--m)">(' + msgs.length + ')</span></div>';
    h += '<div style="display:flex;gap:8px;align-items:center">';
    if (chatHighlights.length > 0) {
        h += '<div class="nav-arrows"><button onclick="navHighlight(-1)">▲</button><span id="hlCount">' + chatHighlights.length + ' نتيجة</span><button onclick="navHighlight(1)">▼</button></div>';
    }
    h += '<button class="btn" onclick="backToConvs()">← رجوع</button></div></div>';
    h += '<div class="chat-area" id="chatArea">';

    msgs.forEach((m, i) => {
        const id = 'msg-' + i;
        if (m.system || (m.text && m.text.startsWith('📌'))) {
            h += '<div class="msg msg-s" id="' + id + '">' + highlightText(m.text||'', searchQuery) + '<small>' + fmt(m.t) + '</small></div>';
        } else {
            const cls = m.from === first ? 'msg-r' : 'msg-l';
            h += '<div class="msg ' + cls + '" id="' + id + '"><div class="sender">' + esc(m.fromName||'—') + '</div>';
            h += highlightText(m.text||'', searchQuery) + '<small>' + fmt(m.t) + '</small></div>';
        }
    });
    h += '</div></div>';
    document.getElementById('p-chat').innerHTML = h;

    // انتقل لأول نتيجة بحث
    if (chatHighlights.length > 0) {
        window._hlIndex = 0;
        setTimeout(() => navHighlight(0), 100);
    }
}

window._hlIndex = 0;
function navHighlight(dir) {
    if (!chatHighlights.length) return;
    if (dir !== 0) window._hlIndex += dir;
    if (window._hlIndex < 0) window._hlIndex = chatHighlights.length - 1;
    if (window._hlIndex >= chatHighlights.length) window._hlIndex = 0;
    const msgIdx = chatHighlights[window._hlIndex];
    const el = document.getElementById('msg-' + msgIdx);
    if (el) {
        el.scrollIntoView({ behavior:'smooth', block:'center' });
        el.style.outline = '2px solid var(--a)';
        setTimeout(() => el.style.outline = '', 2000);
    }
    const counter = document.getElementById('hlCount');
    if (counter) counter.textContent = (window._hlIndex + 1) + '/' + chatHighlights.length;
}

function backToConvs() {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('p-convs').classList.add('active');
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === 'convs'));
}

// Event delegation للمحادثات — أأمن من inline onclick
document.getElementById('p-convs').addEventListener('click', e => {
    const conv = e.target.closest('[data-conv]');
    if (conv) openConv(conv.dataset.conv);
});
</script>
</body>
</html>
