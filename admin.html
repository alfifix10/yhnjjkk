<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeerani — لوحة التحكم</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Poppins:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root { --p:#6c5ce7; --a:#00cec9; --d:#0a0a0f; --d2:#12121a; --d3:#1a1a2e; --d4:#252540; --t:#e8e8f0; --m:#7f7f9a; --b:rgba(255,255,255,0.07); --r:#e17055; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Cairo',sans-serif; background:var(--d); color:var(--t); min-height:100vh; }
        .login { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; gap:14px; padding:16px; }
        .login-frame { background:var(--d2); border:1px solid var(--b); border-radius:24px; padding:40px 36px 32px; display:flex; flex-direction:column; align-items:center; gap:14px; box-shadow:0 16px 60px rgba(0,0,0,0.5); width:min(90vw, 380px); }
        .login-logo { font-family:'Poppins'; font-size:28px; font-weight:800; color:#fff; letter-spacing:2px; }
        .login input { padding:14px 20px; border-radius:14px; border:2px solid var(--b); background:var(--d2); color:var(--t); font-family:'Cairo'; font-size:16px; width:100%; text-align:center; outline:none; }
        .login input:focus { border-color:var(--p); }
        .login button { padding:12px 36px; border-radius:14px; border:none; background:var(--p); color:#fff; font-family:'Cairo'; font-size:15px; font-weight:700; cursor:pointer; }
        .app { display:none; }
        .top { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; background:var(--d2); border-bottom:1px solid var(--b); position:sticky; top:0; z-index:10; }
        .top-title { font-family:'Poppins'; font-weight:800; font-size:16px; }
        .top-actions { display:flex; gap:6px; }
        .btn { padding:6px 14px; border-radius:8px; border:1px solid var(--b); background:var(--d3); color:var(--t); font-family:'Cairo'; cursor:pointer; font-size:11px; }
        .btn:hover { background:var(--d4); }
        .content { max-width:700px; margin:0 auto; padding:12px; }
        .stats { display:flex; gap:8px; margin-bottom:12px; }
        .stat { flex:1; background:var(--d2); border:1px solid var(--b); border-radius:14px; padding:12px; text-align:center; }
        .stat b { font-size:24px; color:var(--p); display:block; }
        .stat span { font-size:10px; color:var(--m); }
        .search { width:100%; padding:10px 16px; border-radius:10px; border:1px solid var(--b); background:var(--d2); color:var(--t); font-family:'Cairo'; font-size:14px; outline:none; margin-bottom:12px; }
        .search:focus { border-color:var(--p); }
        .tabs { display:flex; gap:4px; margin-bottom:12px; background:var(--d2); border-radius:10px; padding:3px; }
        .tab { flex:1; text-align:center; padding:7px; border-radius:8px; font-size:12px; font-weight:600; color:var(--m); cursor:pointer; }
        .tab.active { background:var(--p); color:#fff; }
        .card { background:var(--d2); border:1px solid var(--b); border-radius:12px; margin-bottom:6px; overflow:hidden; }
        .item { display:flex; align-items:center; justify-content:space-between; padding:10px 14px; border-bottom:1px solid rgba(255,255,255,0.03); }
        .item:last-child { border:none; }
        .name { font-weight:700; font-size:13px; }
        .id { font-size:9px; color:var(--m); }
        .time { font-size:10px; color:var(--m); }
        .dot { width:7px; height:7px; background:var(--a); border-radius:50%; display:inline-block; margin-right:5px; }
        .conv { cursor:pointer; transition:0.2s; }
        .conv:hover { background:rgba(108,92,231,0.05); }
        .badge { background:var(--p); color:#fff; font-size:10px; font-weight:700; padding:2px 7px; border-radius:50px; }
        .preview { font-size:11px; color:var(--m); margin-top:2px; max-width:300px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .system-msg { color:var(--a); font-style:italic; }
        .chat-top { display:flex; align-items:center; justify-content:space-between; padding:10px 14px; background:var(--d2); border-bottom:1px solid var(--b); }
        .chat-area { padding:12px; max-height:60vh; overflow-y:auto; display:flex; flex-direction:column; gap:5px; }
        .msg { max-width:80%; padding:7px 11px 3px; border-radius:12px; font-size:12px; line-height:1.5; }
        .msg-r { align-self:flex-start; background:var(--p); color:#fff; border-bottom-right-radius:3px; }
        .msg-l { align-self:flex-end; background:var(--d4); border-bottom-left-radius:3px; }
        .msg-s { align-self:center; color:var(--a); font-size:11px; font-style:italic; }
        .msg small { font-size:9px; opacity:0.5; display:block; text-align:left; }
        .msg .sender { font-size:9px; font-weight:700; opacity:0.6; margin-bottom:1px; }
        .row { display:flex; gap:10px; padding:7px 14px; border-bottom:1px solid rgba(255,255,255,0.03); font-size:11px; align-items:center; }
        .row:last-child { border:none; }
        .col-from { width:70px; font-weight:700; color:var(--a); flex-shrink:0; }
        .col-to { width:70px; font-weight:700; color:var(--p); flex-shrink:0; }
        .col-text { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .col-time { width:60px; color:var(--m); font-size:9px; text-align:left; flex-shrink:0; }
        .empty { text-align:center; color:var(--m); padding:30px 14px; font-size:13px; }
        .panel { display:none; }
        .panel.active { display:block; }
        @media(max-width:768px) { .stat b { font-size:20px; } .stats { gap:4px; } }
    </style>
</head>
<body>

<div class="login" id="login">
    <div class="login-frame">
        <img src="assets/logo.png" alt="Jeerani" style="width:200px;height:auto">
        <div style="color:var(--m);font-size:13px">لوحة التحكم</div>
        <input type="password" id="pass" placeholder="كلمة المرور">
        <button onclick="auth()">دخول</button>
    </div>
</div>

<div class="app" id="app">
    <div class="top">
        <div class="top-title">Jeerani Admin</div>
        <div class="top-actions">
            <button class="btn" onclick="load()">🔄</button>
            <button class="btn" id="liveBtn" onclick="toggleLive()">📡 مباشر</button>
        </div>
    </div>
    <div class="content">
        <div class="stats">
            <div class="stat"><b id="sOn">0</b><span>متصل</span></div>
            <div class="stat"><b id="sCo">0</b><span>محادثة</span></div>
            <div class="stat"><b id="sMs">0</b><span>رسالة</span></div>
        </div>
        <input class="search" id="searchBox" placeholder="🔍 بحث بالاسم أو النص..." oninput="filterAll()">
        <div class="tabs">
            <div class="tab active" data-tab="online">👥 المتصلين</div>
            <div class="tab" data-tab="convs">💬 المحادثات</div>
            <div class="tab" data-tab="msgs">📝 السجل</div>
            <div class="tab" data-tab="banned">🚫 المحظورين</div>
        </div>
        <div id="p-online" class="panel active"></div>
        <div id="p-convs" class="panel"></div>
        <div id="p-chat" class="panel"></div>
        <div id="p-msgs" class="panel"></div>
        <div id="p-banned" class="panel"></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-database-compat.js"></script>
<script>
const PASS = 'Mm123';
let logs = [], convs = {}, live = false, liveRef = null;

firebase.initializeApp({
    apiKey: "AIzaSyBxr265lCyx0GJw02oE9GQev8kBQRgiTZw",
    databaseURL: "https://jiranak-e9ee2-default-rtdb.firebaseio.com",
    projectId: "jiranak-e9ee2"
});
const db = firebase.database();

function auth() {
    if (document.getElementById('pass').value === PASS) {
        document.getElementById('login').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        load();
    }
}
document.getElementById('pass').onkeypress = e => { if (e.key === 'Enter') auth(); };

document.querySelectorAll('.tab').forEach(t => {
    t.onclick = () => {
        document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
        t.classList.add('active');
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.getElementById('p-' + t.dataset.tab).classList.add('active');
    };
});

function toggleLive() {
    live = !live;
    document.getElementById('liveBtn').textContent = live ? '⏹ إيقاف' : '📡 مباشر';
    if (live) {
        liveRef = db.ref('logs').orderByChild('t').startAt(Date.now());
        liveRef.on('child_added', () => load());
    } else {
        if (liveRef) liveRef.off();
    }
}

function fmt(t) {
    if (!t) return '';
    return new Date(t).toLocaleTimeString('ar', {hour:'2-digit', minute:'2-digit', hour12:true});
}

function fmtFull(t) {
    if (!t) return '';
    const d = new Date(t);
    return d.toLocaleDateString('ar', {day:'numeric', month:'short'}) + ' ' + fmt(t);
}

function esc(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

function banUser(uid, name) {
    if (!confirm('حظر ' + name + '؟\nسيتم حذفه من القائمة وإرسال إشعار له.')) return;
    // حذف من online
    db.ref('online/' + uid).remove();
    // إرسال إشعار حظر
    db.ref('msgs/' + uid).push({
        from: 'admin', name: '🚫 الإدارة', text: '🚫 تم حظرك من قبل الإدارة',
        t: firebase.database.ServerValue.TIMESTAMP, system: true
    });
    // حفظ في قائمة المحظورين
    db.ref('banned/' + uid).set({ name: name, t: firebase.database.ServerValue.TIMESTAMP });
}

function unbanUser(uid) {
    db.ref('banned/' + uid).remove();
    load();
}

function filterAll() {
    const q = document.getElementById('searchBox').value.trim().toLowerCase();
    // فلتر المتصلين
    document.querySelectorAll('#p-online .item').forEach(el => {
        el.style.display = el.textContent.toLowerCase().includes(q) ? '' : 'none';
    });
    // فلتر المحادثات
    document.querySelectorAll('#p-convs .card').forEach(el => {
        el.style.display = el.textContent.toLowerCase().includes(q) ? '' : 'none';
    });
    // فلتر السجل
    document.querySelectorAll('#p-msgs .row').forEach(el => {
        el.style.display = el.textContent.toLowerCase().includes(q) ? '' : 'none';
    });
}

function load() {
    // المتصلين (لحظي)
    db.ref('online').on('value', snap => {
        const data = snap.val() || {};
        const users = Object.entries(data);
        document.getElementById('sOn').textContent = users.length;
        let h = '<div class="card">';
        if (!users.length) {
            h += '<div class="empty">لا يوجد أحد</div>';
        } else {
            users.forEach(([id, u]) => {
                h += '<div class="item"><div><span class="name">' + esc(u.name || '—') + '</span><span class="dot"></span>';
                if (u.acc) h += '<span style="font-size:9px;color:var(--m);margin-right:6px">GPS: ' + Math.round(u.acc) + 'm</span>';
                h += '<div class="id">' + id.slice(0, 14) + '</div></div>';
                h += '<div style="display:flex;gap:6px;align-items:center"><span class="time">' + fmt(u.t) + '</span><button class="btn" style="font-size:10px;padding:2px 6px;color:var(--r);border-color:var(--r)" data-uid="' + id + '" data-name="' + esc(u.name||'') + '" onclick="banUser(this.dataset.uid,this.dataset.name)">🚫</button></div></div>';
            });
        }
        h += '</div>';
        document.getElementById('p-online').innerHTML = h;
    });

    // المحظورين
    db.ref('banned').once('value', snap => {
        const data = snap.val() || {};
        const list = Object.entries(data);
        let bh = '<div class="card">';
        if (!list.length) {
            bh += '<div class="empty">لا يوجد محظورين</div>';
        } else {
            list.forEach(([uid, u]) => {
                bh += '<div class="item"><div><span class="name">' + esc(u.name || uid.slice(0,14)) + '</span>';
                bh += '<div class="id">' + uid.slice(0,14) + '</div></div>';
                bh += '<button class="btn" style="font-size:10px;padding:3px 10px;color:var(--a);border-color:var(--a)" onclick="unbanUser(\'' + uid + '\')">إلغاء الحظر</button></div>';
            });
        }
        bh += '</div>';
        document.getElementById('p-banned').innerHTML = bh;
    });

    // السجل + المحادثات
    db.ref('logs').orderByChild('t').limitToLast(500).once('value', snap => {
        const data = snap.val() || {};
        logs = Object.values(data).sort((a, b) => (b.t || 0) - (a.t || 0));
        document.getElementById('sMs').textContent = logs.length;

        // السجل
        let mh = '<div class="card">';
        if (!logs.length) {
            mh += '<div class="empty">لا توجد رسائل</div>';
        } else {
            logs.slice(0, 200).forEach(m => {
                const cls = m.system ? ' system-msg' : '';
                mh += '<div class="row"><div class="col-from">' + esc(m.fromName || '—') + '</div>';
                mh += '<div class="col-to">' + esc(m.toName || '—') + '</div>';
                mh += '<div class="col-text' + cls + '">' + esc(m.text || '') + '</div>';
                mh += '<div class="col-time">' + fmt(m.t) + '</div></div>';
            });
        }
        mh += '</div>';
        document.getElementById('p-msgs').innerHTML = mh;

        // تجميع المحادثات
        convs = {};
        logs.forEach(m => {
            if (!m.from || !m.to) return;
            const pair = [m.from, m.to].sort().join('_');
            if (!convs[pair]) convs[pair] = { users: {}, msgs: [], lastTime: 0, lastText: '', hasSystem: false };
            convs[pair].users[m.from] = m.fromName;
            convs[pair].users[m.to] = m.toName;
            convs[pair].msgs.push(m);
            if ((m.t || 0) > convs[pair].lastTime) {
                convs[pair].lastTime = m.t;
                convs[pair].lastText = m.text;
            }
            if (m.system) convs[pair].hasSystem = true;
        });

        const arr = Object.entries(convs).sort((a, b) => b[1].lastTime - a[1].lastTime);
        document.getElementById('sCo').textContent = arr.length;

        let ch = '';
        if (!arr.length) {
            ch = '<div class="card"><div class="empty">لا توجد محادثات</div></div>';
        } else {
            arr.forEach(([key, c]) => {
                const names = Object.values(c.users).filter(Boolean);
                const textCls = c.lastText && c.lastText.startsWith('📌') ? ' system-msg' : '';
                ch += '<div class="card"><div class="item conv" onclick="openConv(\'' + key + '\')">';
                ch += '<div><div class="name">' + esc(names.join(' ↔ ')) + '</div>';
                ch += '<div class="preview' + textCls + '">' + esc(c.lastText || '') + '</div>';
                ch += '<div class="time">' + fmtFull(c.lastTime) + '</div></div>';
                ch += '<div class="badge">' + c.msgs.length + '</div>';
                ch += '</div></div>';
            });
        }
        document.getElementById('p-convs').innerHTML = ch;
    });
}

function openConv(key) {
    const c = convs[key];
    if (!c) return;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('p-chat').classList.add('active');

    const names = Object.values(c.users).filter(Boolean);
    const msgs = c.msgs.sort((a, b) => (a.t || 0) - (b.t || 0));
    const first = msgs[0] ? msgs[0].from : '';

    let h = '<div class="card">';
    h += '<div class="chat-top"><strong>' + esc(names.join(' ↔ ')) + ' (' + msgs.length + ')</strong>';
    h += '<button class="btn" onclick="backToConvs()">← رجوع</button></div>';
    h += '<div class="chat-area">';
    msgs.forEach(m => {
        if (m.system || (m.text && m.text.startsWith('📌'))) {
            h += '<div class="msg msg-s">' + esc(m.text || '') + '<small>' + fmt(m.t) + '</small></div>';
        } else {
            const cls = m.from === first ? 'msg-r' : 'msg-l';
            h += '<div class="msg ' + cls + '"><div class="sender">' + esc(m.fromName || '—') + '</div>';
            h += esc(m.text || '') + '<small>' + fmt(m.t) + '</small></div>';
        }
    });
    h += '</div></div>';
    document.getElementById('p-chat').innerHTML = h;
}

function backToConvs() {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('p-convs').classList.add('active');
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === 'convs'));
}
</script>
</body>
</html>
