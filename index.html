<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="2Q9q_nFX-beLEh4hYGzQOUsluy16RKQDpMK6tVGgYaY" />

    <!-- SEO -->
    <title>Jeerani — دردش مع جيرانك</title>
    <meta name="description" content="دردش مع الناس القريبين منك — مجهول تماماً وبدون تسجيل. اكتشف جيرانك وابدأ محادثة فورية&#x200F;!">
    <meta name="keywords" content="دردشة, جيران, مجهول, مؤقت, قريب, chat, anonymous, nearby, jeerani">
    <meta name="author" content="Jeerani">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://jeerani.net/">

    <!-- Open Graph (Facebook/WhatsApp) -->
    <meta property="og:title" content="دردش مع الناس القريبين منك — مجهول تماماً وبدون تسجيل. اكتشف جيرانك وابدأ محادثة فورية&#x200F;!">
    <meta property="og:description" content="دردش مع الناس القريبين منك — مجهول تماماً وبدون تسجيل. اكتشف جيرانك وابدأ محادثة فورية&#x200F;!">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://jeerani.net/">
    <meta property="og:locale" content="ar_SA">
    <meta property="og:site_name" content="Jeerani">
    <meta property="og:image" content="https://jeerani.net/assets/logo.png">
    <meta property="og:image:width" content="480">
    <meta property="og:image:height" content="600">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://jeerani.net/assets/logo.png">
    <meta name="twitter:title" content="دردش مع الناس القريبين منك — مجهول تماماً وبدون تسجيل. اكتشف جيرانك وابدأ محادثة فورية&#x200F;!">
    <meta name="twitter:description" content="دردش مع الناس القريبين منك — مجهول تماماً وبدون تسجيل. اكتشف جيرانك وابدأ محادثة فورية&#x200F;!">

    <!-- PWA -->
    <meta name="theme-color" content="#6c5ce7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Jeerani">
    <link rel="apple-touch-icon" href="assets/logo.png">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="assets/logo.png" type="image/png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Poppins:wght@700;800;900&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css?t=v3.1">

    <!-- Structured Data — يخلي Google يعرض الموقع بشكل مميز -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Jeerani",
        "alternateName": "جيراني",
        "url": "https://jeerani.net",
        "description": "دردش مع الناس القريبين منك — مجهول تماماً وبدون تسجيل",
        "applicationCategory": "SocialNetworkingApplication",
        "operatingSystem": "Web",
        "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "SAR"
        },
        "image": "https://jeerani.net/assets/logo.png",
        "screenshot": "https://jeerani.net/assets/logo.png",
        "inLanguage": ["ar", "en"],
        "author": {
            "@type": "Organization",
            "name": "Jeerani",
            "url": "https://jeerani.net"
        },
        "softwareVersion": "1.0"
    }
    </script>
</head>
<body>
    <div id="offlineBanner" class="offline-banner" style="display:none">
        ⚠️ لا يوجد اتصال بالإنترنت
    </div>
    <div id="particles"></div>
    <div id="landingScreen" class="screen active">
        <div class="screen-content">
            <div class="frame">
                <img src="assets/logo.png" alt="Jeerani" class="logo-img">
                <h1 class="title">دردش مع جيرانك</h1>
                <p class="subtitle">🔒 مجهول · 💨 مؤقت</p>
                <div class="input-group">
                    <input type="text" id="nicknameInput" placeholder="اكتب اسم مستعار..." maxlength="12" autocomplete="off">
                    <button type="button" id="joinBtn" class="btn-primary">ادخل</button>
                </div>
                <div class="random-names">
                    <button class="name-chip" data-name="فضولي">فضولي</button>
                    <button class="name-chip" data-name="زائر">زائر</button>
                    <button class="name-chip" data-name="مجهول">مجهول</button>
                    <button class="name-chip" data-name="ولد الحارة">ولد الحارة</button>
                    <button class="name-chip" data-name="بنت الجيران">بنت الجيران</button>
                </div>
            </div>
        </div>
    </div>
    <div id="peopleScreen" class="screen">
        <div class="topbar">
            <div class="topbar-right">
                <span id="myName" class="my-name"></span>
                <button id="editNameBtn" class="edit-name-btn" title="تعديل الاسم">✏️</button>
            </div>
            <div class="topbar-center">
                <span id="onlineCount" class="online-badge">0 جار متصل</span>
                <div class="pulse-dot"></div>
            </div>
            <div class="topbar-left">
                <button id="soundToggle" onclick="toggleSound()" class="topbar-icon-btn" title="كتم/تفعيل الصوت">🔊</button>
                <button id="shareBtn" class="topbar-icon-btn" title="مشاركة">📤</button>
                <button id="backToLanding" class="back-btn" title="رجوع">↩</button>
            </div>
        </div>
        <div class="screen-content people-content">
            <div class="people-frame">
                <button type="button" id="unblockBtn" class="unblock-btn" style="display:none">🔓 إلغاء الحظر</button>
                <h2>الجيران المتصلين الآن</h2>
                <p class="hint">اختر شخص وابدأ الدردشة</p>
                <div id="searchingSpinner" class="searching">
                    <div class="spinner"></div>
                    <p>جاري البحث عن جيران...</p>
                </div>
                <div id="peopleList" class="people-list" style="display:none"></div>
                <div id="noPeople" class="no-people" style="display:none">
                    <div class="empty-icon">👀</div>
                    <p>ما فيه أحد متصل الآن</p>
                    <p class="hint">شارك الرابط مع أصدقائك!</p>
                    <button onclick="shareLink()" class="btn-secondary">📤 شارك الرابط</button>
                </div>
            </div>
        </div>
    </div>
    <div id="chatScreen" class="screen">
        <div class="topbar chat-topbar">
            <button id="backToPeople" class="back-btn">→</button>
            <div class="topbar-info">
                <span id="chatWith" class="chat-with-name"></span>
                <span id="chatDistance" class="distance-badge"></span>
            </div>
            <button type="button" id="blockBtn" class="block-btn" title="حظر">🚫</button>
        </div>
        <div class="chat-frame">
            <div id="chatMessages" class="chat-messages"></div>
            <button type="button" id="scrollDownBtn" class="scroll-down-btn" style="display:none" onclick="var m=document.getElementById('chatMessages');m.scrollTop=m.scrollHeight;this.style.display='none'">↓ رسائل جديدة</button>
            <div id="typingIndicator" class="typing-indicator" style="display:none">
                <span></span><span></span><span></span>
                <small>يكتب...</small>
            </div>
            <div class="chat-input-bar">
                <span id="charCounter" class="char-counter" style="display:none"></span>
                <input type="text" id="msgInput" placeholder="اكتب رسالة..." maxlength="500" autocomplete="off">
                <button id="sendBtn" class="btn-send">ارسل</button>
            </div>
        </div>
    </div>
    <div id="modalOverlay" class="modal-overlay" style="display:none">
        <div class="modal-card">
            <h3 id="modalTitle" class="modal-title"></h3>
            <p id="modalMessage" class="modal-message"></p>
            <input type="text" id="modalInput" class="modal-input" style="display:none" autocomplete="off">
            <div id="modalButtons" class="modal-buttons"></div>
        </div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-database-compat.js"></script>
    <script src="js/app.js?t=v3.1"></script>
</body>
</html>
