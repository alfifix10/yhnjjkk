<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>جيراني — دردش مع اللي حولك</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏘️</text></svg>">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6c5ce7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="css/style.css?t=20260329k">
</head>
<body>
    <!-- بانر عدم الاتصال -->
    <div id="offlineBanner" class="offline-banner" style="display:none">
        ⚠️ لا يوجد اتصال بالإنترنت
    </div>

    <!-- Particles -->
    <div id="particles"></div>

    <!-- Screen 1: Landing -->
    <div id="landingScreen" class="screen active">
        <div class="screen-content">
            <div class="frame">
                <div class="logo-text">جيراني</div>
                <h1 class="title">دردش مع جيرانك</h1>
                <p class="subtitle">🔒 مجهول · 💨 مؤقت</p>
                <div class="input-group">
                    <input type="text" id="nicknameInput" placeholder="اكتب اسم مستعار..." maxlength="20" autocomplete="off">
                    <button type="button" id="joinBtn" class="btn-primary">ادخل</button>
                </div>
                <div class="random-names">
                    <button class="name-chip" data-name="الجار الفضولي">الجار الفضولي</button>
                    <button class="name-chip" data-name="أبو القطط">أبو القطط</button>
                    <button class="name-chip" data-name="بنت الحارة">بنت الحارة</button>
                    <button class="name-chip" data-name="مجهول">مجهول</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Screen 2: Nearby People -->
    <div id="peopleScreen" class="screen">
        <div class="topbar">
            <div class="topbar-info">
                <span id="myName" class="my-name"></span>
                <button id="editNameBtn" class="edit-name-btn" title="تعديل الاسم">✏️</button>
                <span id="onlineCount" class="online-badge">0 جار متصل</span>
                <div class="pulse-dot"></div>
            </div>
            <button id="backToLanding" class="back-btn" title="تغيير الاسم والخروج">↩</button>
        </div>
        <div class="screen-content people-content">
            <div class="people-frame">
                <button type="button" id="unblockBtn" class="unblock-btn" style="display:none">🔓 إلغاء الحظر</button>
                <h2>الجيران المتصلين الآن</h2>
                <p class="hint">اختر شخص وابدأ الدردشة</p>
                <div id="searchingSpinner" class="searching">
                    <div class="spinner"></div>
                    <p>جاري البحث عن جيران...</p>
                </div>
                <div id="peopleList" class="people-list" style="display:none">
                    <!-- يتم إضافتها ديناميكياً -->
                </div>
                <div id="noPeople" class="no-people" style="display:none">
                    <div class="empty-icon">👀</div>
                    <p>ما فيه أحد متصل الآن</p>
                    <p class="hint">شارك الرابط مع جيرانك!</p>
                    <button id="shareBtn" class="btn-secondary">📤 شارك الرابط</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Screen 3: Chat -->
    <div id="chatScreen" class="screen">
        <div class="topbar chat-topbar">
            <button id="backToPeople" class="back-btn">→</button>
            <div class="topbar-info">
                <span id="chatWith" class="chat-with-name"></span>
                <span id="chatDistance" class="distance-badge"></span>
            </div>
            <button type="button" id="blockBtn" class="block-btn" title="حظر">🚫</button>
        </div>
        <div class="chat-frame">
            <div id="chatMessages" class="chat-messages">
                <!-- الرسائل -->
            </div>
            <button type="button" id="scrollDownBtn" class="scroll-down-btn" style="display:none" onclick="var m=document.getElementById('chatMessages');m.scrollTop=m.scrollHeight;this.style.display='none'">↓ رسائل جديدة</button>
            <div id="typingIndicator" class="typing-indicator" style="display:none">
                <span></span><span></span><span></span>
                <small>يكتب...</small>
            </div>
            <div class="chat-input-bar">
                <span id="charCounter" class="char-counter" style="display:none"></span>
                <input type="text" id="msgInput" placeholder="اكتب رسالة..." maxlength="500" autocomplete="off">
                <button id="sendBtn" class="btn-send">ارسل</button>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div id="modalOverlay" class="modal-overlay" style="display:none">
        <div class="modal-card">
            <h3 id="modalTitle" class="modal-title"></h3>
            <p id="modalMessage" class="modal-message"></p>
            <input type="text" id="modalInput" class="modal-input" style="display:none" autocomplete="off">
            <div id="modalButtons" class="modal-buttons"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-database-compat.js"></script>
    <script src="js/app.js?t=20260329n"></script>
</body>
</html>
